<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff0000">
<title>SLEB-WEB</title>

<style>
*{box-sizing:border-box;}
html,body{height:100%;margin:0;font-family:sans-serif;background:#000;color:#fff;-webkit-tap-highlight-color:transparent;}
#app{display:none;}
#login{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;}
#menu{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:10px;}
.lock{font-size:85px;margin-bottom:15px;animation:float 3s infinite;}
@keyframes float{50%{transform:translateY(-15px);}}
h1{color:#ff0000;text-shadow:0 0 10px red;margin:0;}
h2{margin:10px 0;}
.menu{display:flex;flex-direction:column;gap:10px;width:220px;}
button{background:none;border:1px solid #444;color:#ccc;padding:12px;border-radius:6px;font-size:16px;cursor:pointer;width:60%;}
button:active{background:#222;}
input[type=password]{background:#111;border:1px solid #444;color:#fff;padding:10px;border-radius:6px;font-size:16px;width:220px;text-align:center;}
.screen{display:none;}
.active{display:flex;flex-direction:column;align-items:center;min-height:100%;padding-bottom:20px;}
.top-bar{display:flex;gap:10px;margin:15px;width:calc(100% - 30px);}
.top-bar button{flex:1;}
.card{background:#111;padding:15px;margin:10px 15px;border-radius:12px;width:calc(100% - 30px);display:flex;flex-direction:column;gap:8px;border:1px solid #222;}
textarea{width:100%;min-height:80px;padding:8px;background:#1a1a1a;border:1px solid #333;color:#fff;border-radius:6px;font-size:15px;resize:vertical;}
img.card-img{max-width:100%;border-radius:10px;cursor:pointer;}
.file-btn{background:#1a1a1a;border:1px dashed #555;color:#888;font-size:13px;}
#error{color:#f55;font-size:14px;}
.loading{color:#888;font-size:14px;margin:20px;}
.sync-badge{font-size:11px;color:#4a4;margin-left:5px;}

/* 🔥 VISOR PANTALLA COMPLETA */
#fullscreenViewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#fullscreenViewer img{
  max-width:95%;
  max-height:95%;
  border-radius:10px;
}

#closeBtn{
  position:absolute;
  top:15px;
  right:20px;
  font-size:28px;
  color:#fff;
  cursor:pointer;
  background:rgba(0,0,0,0.5);
  padding:5px 10px;
  border-radius:50%;
}
</style>
</head>
<body>

<div id="login">
  <div class="lock">🗂</div>
  <h1>SLEB-WEB</h1>
  <input type="password" id="codeInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')checkCode()">
  <button onclick="checkCode()">Entrar</button>
  <p id="error"></p>
</div>

<div id="app">
  <div id="menu" class="screen active">
    <h2> Menú</h2>
    <div class="menu">
      <button onclick="openSection('ciudadania_valores')">🌍 Ciudadanía y Valores</button>
      <button onclick="openSection('lenguaje')">📖 Lenguaje</button>
      <button onclick="openSection('precalculo')">📐 Precálculo</button>
      <button onclick="openSection('ciencias')">🔬 Ciencias</button>
      <button onclick="openSection('ingles')">🇬🇧 Inglés</button>
      <button onclick="openSection('aleman')">🇩🇪 Alemán</button>
      <button onclick="openSection('frances')">🇫🇷 Francés</button>
      <button onclick="openGeheimnis()">📕 Geheimnis</button>
      <button onclick="openDazer()">💵🛍 DAZER</button>
    </div>
    <br>
    <div class="menu">
      <button onclick="refreshApp()">🥒 Refrescar</button>
      <button onclick="logout()"> 🍑Salir</button>
    </div>
  </div>

  <div id="ciudadania_valores" class="screen"></div>
  <div id="lenguaje" class="screen"></div>
  <div id="precalculo" class="screen"></div>
  <div id="ciencias" class="screen"></div>
  <div id="ingles" class="screen"></div>
  <div id="aleman" class="screen"></div>
  <div id="frances" class="screen"></div>
  <div id="secret" class="screen"></div>
  <div id="dazer" class="screen"></div>
</div>

<!-- 🔥 VISOR -->
<div id="fullscreenViewer">
  <span id="closeBtn" onclick="closeFullscreen()">✖</span>
  <img id="fullscreenImg">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, addDoc, updateDoc, doc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAUxe5KsI0KbHguw41jPINqImdmzvpDNmI",
  authDomain: "sleb-web.firebaseapp.com",
  projectId: "sleb-web",
  storageBucket: "sleb-web.firebasestorage.app",
  messagingSenderId: "719197483079",
  appId: "1:719197483079:web:2a005105af5a40d86e4162"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SECRET = "sixseven";
let listeners = {};

function checkCode(){
  const v = document.getElementById("codeInput").value;
  if(v === SECRET){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    localStorage.setItem("logged","true");
  } else {
    document.getElementById("error").textContent = "X Contraseña incorrecta";
  }
}
window.checkCode = checkCode;

window.onload = function(){
  if(localStorage.getItem("logged") === "true"){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  }
};

window.refreshApp = () => location.reload();
window.logout = () => { localStorage.removeItem("logged"); location.reload(); };

window.openSection = function(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  const sec = document.getElementById(id);
  sec.classList.add("active");
  if(!sec.dataset.loaded) loadSection(id);
};

window.openGeheimnis = () => { if(prompt("Código:") === "67") window.openSection("secret"); };
window.openDazer = () => window.openSection("dazer");

function openMenu(){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("menu").classList.add("active");
}
window.openMenu = openMenu;

/* 🔥 FUNCIONES FULLSCREEN */
window.openFullscreen = function(src){
  document.getElementById("fullscreenImg").src = src;
  document.getElementById("fullscreenViewer").style.display = "flex";
}

window.closeFullscreen = function(){
  document.getElementById("fullscreenViewer").style.display = "none";
}

async function loadSection(id){
  const container = document.getElementById(id);
  container.dataset.loaded = true;
  container.innerHTML = "";

  const bar = document.createElement("div");
  bar.className = "top-bar";
  const back = document.createElement("button");
  back.textContent = "← Volver";
  back.onclick = openMenu;
  const add = document.createElement("button");
  add.textContent = "+ Añadir nota";
  add.onclick = () => addCard(id);
  bar.append(back, add);
  container.appendChild(bar);

  const loading = document.createElement("p");
  loading.className = "loading";
  loading.textContent = "⏳ Cargando la sleb espere un rato";
  container.appendChild(loading);

  if(listeners[id]) listeners[id]();
  listeners[id] = onSnapshot(collection(db, id), (snapshot) => {
    const cards = container.querySelectorAll(".card");
    cards.forEach(c => c.remove());
    const lp = container.querySelector(".loading");
    if(lp) lp.remove();

    const docs = [];
    snapshot.forEach(docSnap => docs.push(docSnap));
    docs.sort((a, b) => (a.data().createdAt || 0) - (b.data().createdAt || 0));

    docs.forEach(docSnap => {
      const data = docSnap.data();
      renderCard(id, docSnap.id, data.text || "", data.img || "");
    });
  });
}

function renderCard(id, docId, text, imgSrc){
  const container = document.getElementById(id);
  const div = document.createElement("div");
  div.className = "card";

  const file = document.createElement("input");
  file.type = "file"; file.accept = "image/*"; file.style.display = "none";

  const fileBtn = document.createElement("button");
  fileBtn.className = "file-btn";
  fileBtn.textContent = "📷 Agregar imagen";
  fileBtn.onclick = () => file.click();

  const img = document.createElement("img");
  img.className = "card-img";

  if(imgSrc){
    img.src = imgSrc;
    img.style.display = "block";
    fileBtn.style.display = "none";

    /* 🔥 CLICK PARA PANTALLA COMPLETA */
    img.onclick = () => openFullscreen(img.src);
  } else {
    img.style.display = "none";
  }

  file.onchange = () => {
    const r = new FileReader();
    r.onload = async e => {
      img.src = e.target.result;
      img.style.display = "block";
      fileBtn.style.display = "none";

      img.onclick = () => openFullscreen(img.src);

      await updateDoc(doc(db, id, docId), { img: e.target.result });
    };
    r.readAsDataURL(file.files[0]);
  };

  const ta = document.createElement("textarea");
  ta.value = text;
  ta.placeholder = "Escribe aquí tu nota...";
  let timer;
  ta.oninput = () => {
    clearTimeout(timer);
    timer = setTimeout(async () => {
      await updateDoc(doc(db, id, docId), { text: ta.value });
    }, 800);
  };

  div.append(fileBtn, file, img, ta);
  container.appendChild(div);
}

async function addCard(id){
  await addDoc(collection(db, id), { text: "", img: "", createdAt: Date.now() });
}
</script>
</body>
</html>
